<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script>
      (function () {
        // Page theme is driven by map theme at runtime;
        // default to light to prevent flash
        document.documentElement.setAttribute("data-theme", "light");
      })();
    </script>
    <style>
      :root { --bg: #f0e8d4; --text: #222; }
      [data-theme="dim"] { --bg: #3e3632; --text: #d8d0c4; }
      html, body { background-color: var(--bg); color: var(--text); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
